<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Игровой Автомат</title>
    <style>
        body {
            background-color: #05050a;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }
        h1 {
            color: #ffffff;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 40px #00ffff;
            font-size: 3rem;
            margin-bottom: 40px;
            letter-spacing: 4px;
            text-align: center;
        }
        #games-list {
            width: 100%;
            max-width: 600px;
            list-style: none;
            padding: 0;
        }
        .game-item {
            margin-bottom: 20px;
        }
        .game-link {
            display: block;
            padding: 20px;
            border: 2px solid #ff0055;
            border-radius: 8px;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.2);
            text-align: center;
        }
        .game-link:hover {
            background-color: #ff0055;
            box-shadow: 
                0 0 10px #ff0055,
                0 0 30px #ff0055,
                0 0 60px #ff0055;
            text-shadow: 0 0 5px #fff;
            transform: scale(1.03);
        }
        .loading {
            color: #888888;
            font-size: 1.2rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>ARCADE MACHINE</h1>

    <ul id="games-list">
        <li class="loading">Загрузка игровых автоматов...</li>
    </ul>

    <script>
        const GITHUB_USERNAME = 'dedushka2005'; 

        async function loadGames() {
            const listElement = document.getElementById('games-list');
            try {
                // ТУТ ВСЁ ИСПРАВЛЕНО: Строго правильный технический адрес API GitHub
                const response = await fetch('https://github.com');
                if (!response.ok) throw new Error('Ошибка сети');
                
                const repos = await response.json();
                listElement.innerHTML = ''; 

                const gameRepos = repos.filter(repo => {
                    const isHomeRepo = repo.name.toLowerCase() === `${GITHUB_USERNAME}.github.io`.toLowerCase();
                    const hasPages = repo.has_pages;
                    return !isHomeRepo && hasPages;
                });

                if (gameRepos.length === 0) {
                    listElement.innerHTML = '<li class="loading">Игры пока не найдены. Убедитесь, что в настройках репозитория с игрой (Settings -> Pages) включен GitHub Pages!</li>';
                    return;
                }

                gameRepos.forEach(repo => {
                    const li = document.createElement('li');
                    li.className = 'game-item';
                    const gameUrl = `https://${GITHUB_USERNAME}.github.io/${repo.name}/`;
                    const gameName = repo.name.replace(/-/g, ' ');

                    li.innerHTML = `<a href="${gameUrl}" class="game-link" target="_blank">🕹️ ${gameName}</a>`;
                    listElement.appendChild(li);
                });

            } catch (error) {
                console.error(error);
                listElement.innerHTML = '<li class="loading" style="color: red;">Не удалось загрузить список игр :(</li>';
            }
        }

        loadGames();
    </script>
</body>
</html>
