<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Игровой Автомат</title>
    <style>
        /* Стильный ретро-футуристичный дизайн */
        body {
            background-color: #05050a;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-flex: center;
            align-items: center;
            padding: 40px;
            margin: 0;
        }

        /* Наш неоновый заголовок */
        h1 {
            color: #ffffff;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 40px #00ffff;
            font-size: 3rem;
            margin-bottom: 40px;
            letter-spacing: 4px;
        }

        /* Контейнер для списка игр */
        #games-list {
            width: 100%;
            max-width: 600px;
            list-style: none;
            padding: 0;
        }

        /* Каждая игра в списке */
        .game-item {
            margin-bottom: 20px;
        }

        .game-link {
            display: block;
            padding: 20px;
            border: 2px solid #ff0055;
            border-radius: 8px;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.2);
        }

        /* Эффект наведения (неоновое свечение кнопки) */
        .game-link:hover {
            background-color: #ff0055;
            box-shadow: 
                0 0 10px #ff0055,
                0 0 30px #ff0055,
                0 0 60px #ff0055;
            text-shadow: 0 0 5px #fff;
            transform: scale(1.03);
        }

        .loading {
            color: #888888;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <h1 id="title">ARCADE MACHINE</h1>

    <ul id="games-list">
        <li class="loading">Загрузка игровых автоматов...</li>
    </ul>

    <script>
        // Укажи здесь СВОЙ логин на GitHub
        //const GITHUB_USERNAME = 'dedushka2005'; 

        async function loadGames() {
            const listElement = document.getElementById('games-list');
            try {
                // Запрашиваем список всех публичных репозиториев пользователя
                const response = await fetch(`https://github.com/Dedushka2005/repos?per_page=100&sort=updated`);
                if (!response.ok) throw new Error('Ошибка сети');
                
                const repos = await response.json();
                listElement.innerHTML = ''; // Очищаем текст загрузки

                // Фильтруем репозитории
                const gameRepos = repos.filter(repo => {
                    // Исключаем сам корневой репозиторий со списком игр
                    const isHomeRepo = repo.name.toLowerCase() === `Dedushka2005.github.io`.toLowerCase();
                    // Проверяем, включены ли GitHub Pages ИЛИ есть ли у репозитория тег (topic) "game"
                    const hasPages = repo.has_pages;
                    
                    return !isHomeRepo && hasPages;
                });

                if (gameRepos.length === 0) {
                    listElement.innerHTML = '<li class="loading">Игры пока не найдены. Убедитесь, что в настройках репозиториев включен GitHub Pages!</li>';
                    return;
                }

                // Отрисовываем каждую игру
                gameRepos.forEach(repo => {
                    const li = document.createElement('li');
                    li.className = 'game-item';

                    // Формируем ссылку на саму игру (по правилам GitHub Pages URL)
                    const gameUrl = `https://Dedushka2005.github.io/${repo.name}/`;
                    
                    // Красиво форматируем имя репозитория (например, "super-tetris" -> "SUPER TETRIS")
                    const gameName = repo.name.replace(/-/g, ' ');

                    li.innerHTML = `<a href="${gameUrl}" class="game-link" target="_blank">🕹️ ${gameName}</a>`;
                    listElement.appendChild(li);
                });

            } catch (error) {
                console.error(error);
                listElement.innerHTML = '<li class="loading" style="color: red;">Не удалось загрузить список игр :(</li>';
            }
        }

        // Запуск функции при загрузке страницы
        loadGames();
    </script>
</body>
</html>
