<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Игровой Автомат</title>
    <style>
        /* Стильный ретро-футуристичный дизайн */
        body {
            background-color: #05050a;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }

        /* Наш неоновый заголовок */
        h1 {
            color: #ffffff;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 40px #00ffff;
            font-size: 3rem;
            margin-bottom: 40px;
            letter-spacing: 4px;
            text-align: center;
        }

        /* Контейнер для списка игр */
        #games-list {
            width: 100%;
            max-width: 600px;
            list-style: none;
            padding: 0;
        }

        /* Каждая игра в списке */
        .game-item {
            margin-bottom: 20px;
        }

        .game-link {
            display: block;
            padding: 20px;
            border: 2px solid #ff0055;
            border-radius: 8px;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.2);
            text-align: center;
        }

        /* Эффект наведения (неоновое свечение кнопки) */
        .game-link:hover {
            background-color: #ff0055;
            box-shadow: 
                0 0 10px #ff0055,
                0 0 30px #ff0055,
                0 0 60px #ff0055;
            text-shadow: 0 0 5px #fff;
            transform: scale(1.03);
        }
    </style>
</head>
<body>

    <h1>ARCADE MACHINE</h1>

    <ul id="games-list">
        <li class="game-item">
            <a href="https://dedushka2005.github.io/tetris/" class="game-link" target="_blank">🕹️ Tetris AI</a>
        </li>
        <li class="game-item">
            <a href="https://dedushka2005.github.io/star-bandit/" class="game-link" target="_blank">🕹️ Star Bandit AI</a>
        </li>
        <li class="game-item">
            <a href="https://dedushka2005.github.io/colony-survival/" class="game-link" target="_blank">🕹️ Colony Sutvival AI</a>
        </li>        
        <!-- <li class="game-item">
            <a href="https://github.io" class="game-link" target="_blank">🕹️ ИМЯ ИГРЫ</a>
        </li>
        -->
    </ul>

</body>
</html>
